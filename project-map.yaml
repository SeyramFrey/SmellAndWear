# Smell_Wear Project Map
# Auto-generated structure and context index

project:
  name: Smell_Wear
  version: "4.3.0"
  framework: Angular 18.0.4
  backend: Supabase
  payment: Paystack

folders:
  # Root Configuration
  - path: supabase/
    purpose: Supabase backend configuration
    responsibilities:
      - Edge Functions for payment webhooks
      - Database migrations (RLS policies)
      - Local development configuration
      - Database seeding
    keyFiles:
      - config.toml
      - seed.sql
    relatedRoutes: []

  - path: supabase/functions/invite-admin/
    purpose: Admin invitation edge function
    responsibilities:
      - Generate admin invitation links
      - Create admin records in database
    keyFiles:
      - index.ts
    relatedRoutes: []

  - path: src/environments/
    purpose: Environment configuration files
    responsibilities:
      - Supabase URL and API keys
      - Production vs development settings
    keyFiles:
      - environment.ts
      - environment.prod.ts
    relatedRoutes: []

  # Core Module
  - path: src/app/core/
    purpose: Core singleton services and utilities
    responsibilities:
      - Business logic services
      - Authentication and authorization
      - Route guards
      - TypeScript interfaces
      - HTTP interceptors
    keyFiles:
      - services/supabase-auth.service.ts
      - services/cart.service.ts
      - services/commande.service.ts
      - models/models.ts
    relatedRoutes: []

  - path: src/app/core/guards/
    purpose: Route protection guards
    responsibilities:
      - Admin-only access (DB-verified)
      - Authenticated user access
      - Client/non-admin user access
    keyFiles:
      - admin.guard.ts
      - auth.guard.ts
      - client.guard.ts
    relatedRoutes:
      - /admin/* (AdminGuard)
      - /account/* (ClientGuard)

  - path: src/app/core/services/
    purpose: Business logic services (45+ services)
    responsibilities:
      - Supabase client wrapper
      - Shopping cart management
      - Order processing
      - Product operations
      - Customer management
      - Payment processing
    keyFiles:
