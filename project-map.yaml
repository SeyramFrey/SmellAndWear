      - supabase-auth.service.ts
      - cart.service.ts
      - commande.service.ts
      - produit.service.ts
      - categorie.service.ts
      - variant.service.ts
      - delivery-prices.service.ts
    relatedRoutes: []

  - path: src/app/core/models/
    purpose: TypeScript interfaces and types
    responsibilities:
