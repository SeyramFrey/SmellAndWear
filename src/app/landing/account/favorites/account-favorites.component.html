<div class="favorites-page">

  <!-- Header -->
  <div class="favorites-header">
    <button class="back-btn" (click)="goBack()" aria-label="Retour">
      <i class="ri-arrow-left-line"></i>
      <span>Retour</span>
    </button>
    <div class="header-content">
      <h1 class="page-title">Mes favoris</h1>
      <p class="page-subtitle" *ngIf="!loading && validFavorites.length > 0">
        {{ validFavorites.length }}&nbsp;{{ validFavorites.length === 1 ? 'article' : 'articles' }}
      </p>
    </div>
  </div>

  <!-- Loading State -->
  <div class="loading-state" *ngIf="loading">
    <div class="spinner-border text-danger" role="status" style="width:3rem;height:3rem;">
      <span class="visually-hidden">Chargement...</span>
    </div>
    <p class="mt-3 text-muted">Chargement de vos favoris...</p>
  </div>

  <!-- Empty State -->
  <div class="empty-state" *ngIf="!loading && validFavorites.length === 0">
    <div class="empty-content">
      <div class="empty-icon">
        <i class="ri-heart-3-line"></i>
      </div>
      <h2 class="empty-title">Aucun favori pour l'instant</h2>
      <p class="empty-text">
        Ajoutez vos coups de cœur en tapant l'icône ♡ sur les produits que vous aimez.
      </p>
      <a routerLink="/" class="browse-btn">
        <i class="ri-shopping-bag-line"></i>
        Découvrir les produits
      </a>
    </div>
  </div>

  <!-- Favorites Grid — same layout as all-categorie & sub-categorie pages -->
  <section class="favorites-content" *ngIf="!loading && validFavorites.length > 0">
    <div class="container-fluid">
      <div class="row g-4">
        <div
          *ngFor="let item of validFavorites; trackBy: trackByProductId"
          class="col-6 col-sm-6 col-md-4 col-lg-3">
          <app-product-card
            [produit]="item.product!"
            (productClick)="onProductClick($event)"
            (addToCartSuccess)="onAddToCartSuccess($event)"
          ></app-product-card>
        </div>
      </div>
    </div>
  </section>

</div>
