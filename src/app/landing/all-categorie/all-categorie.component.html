<div class="all-categorie-container">
    <!-- Topbar -->
    <app-topbar-landing></app-topbar-landing>

    <!-- Hero Video Section -->
    <app-video-hero [videoSrc]="videoSource">
    </app-video-hero>

    <!-- Filter Button Section -->
    <div class="filter-section">
        <div class="container-fluid">
            <div class="filter-bar">
                <div class="category-info">
                    <h1 class="category-title">{{ categoryName }}</h1>
                    <p class="product-count">{{ products.length }} produit{{ products.length > 1 ? 's' : '' }}</p>
                </div>
                <button class="filter-btn" (click)="openFilterModal()">
                    <i class="ri-filter-3-line"></i>
                    <span>Filtrer</span>
                </button>
            </div>
        </div>
    </div>

    <!-- Products Section -->
    <section class="products-section">
        <div class="container-fluid">
            <!-- Loading State -->
            <div *ngIf="loading" class="loading-container text-center py-5">
                <div class="spinner-border text-primary" role="status">
                    <span class="visually-hidden">Chargement...</span>
                </div>
                <p class="mt-3">Chargement des produits...</p>
            </div>

            <!-- Error State -->
            <div *ngIf="!loading && error" class="error-container text-center py-5">
                <i class="ri-error-warning-line display-1 text-danger"></i>
                <p class="mt-3">{{ error }}</p>
            </div>

            <!-- Empty State -->
            <div *ngIf="!loading && !error && products.length === 0" class="empty-container text-center py-5">
                <i class="ri-shopping-bag-line display-1 text-muted"></i>
                <p class="mt-3">Aucun produit disponible dans cette catégorie pour le moment.</p>
            </div>

            <!-- Products Grid -->
            <div *ngIf="!loading && !error && products.length > 0" class="products-grid">
                <div class="row g-4">
                    <div *ngFor="let produit of products; trackBy: trackByProduct" 
                         class="col-6 col-lg-3 col-md-4 col-sm-6">
                        <app-product-card
                            [produit]="produit"
                            (productClick)="onProductClick($event)"
                            (addToCartSuccess)="onAddToCartSuccess($event)"
                        ></app-product-card>
                    </div>
                </div>
            </div>
        </div>
    </section>

    <app-footer></app-footer>

    <!--start back-to-top-->
    <button (click)="topFunction()" class="btn btn-danger btn-icon landing-back-top" id="back-to-top">
        <i class="ri-arrow-up-line"></i>
    </button>
</div>
