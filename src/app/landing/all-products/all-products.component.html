<app-topbar-landing></app-topbar-landing>

<!-- Hero Section -->
<section class="hero-section">
  <div class="hero-content">
    <h1 class="hero-title">ALL PRODUCTS</h1>
    <p class="hero-subtitle">Explore our entire collection</p>
  </div>
  <div class="hero-overlay"></div>
  <img src="assets/images/hero/all-products.jpg" alt="All Products" class="hero-image" onerror="this.src='assets/images/hero/default-hero.jpg'">
</section>

<!-- Filter Button Section -->
<div class="filter-section">
  <div class="container-fluid">
    <div class="filter-bar">
      <div class="category-info">
        <h1 class="category-title">All Products</h1>
        <p class="product-count">{{ products.length }} produit{{ products.length > 1 ? 's' : '' }}</p>
      </div>
    </div>
  </div>
</div>

<!-- Products Section -->
<section class="products-section">
  <div class="container-fluid">
    <!-- Loading State -->
    <div *ngIf="loading" class="loading-container text-center py-5">
      <div class="spinner-border text-primary" role="status">
        <span class="visually-hidden">Loading...</span>
      </div>
      <p class="mt-3">Loading products...</p>
    </div>

    <!-- Error State -->
    <div *ngIf="!loading && error" class="error-container text-center py-5">
      <i class="ri-error-warning-line display-1 text-danger"></i>
      <p class="mt-3">{{ error }}</p>
    </div>

    <!-- Empty State -->
    <div *ngIf="!loading && !error && products.length === 0" class="empty-container text-center py-5">
      <i class="ri-shopping-bag-line display-1 text-muted"></i>
      <p class="mt-3">No products available at the moment</p>
    </div>

    <!-- Products Grid -->
    <div *ngIf="!loading && !error && products.length > 0" class="products-grid">
      <div class="row g-4">
        <div *ngFor="let product of products; trackBy: trackByProduct" 
             class="col-6 col-lg-3 col-md-4 col-sm-6">
          <app-product-card [produit]="product"></app-product-card>
        </div>
      </div>
    </div>
  </div>
</section>

<app-footer></app-footer>

<!-- Back to top button -->
<button (click)="topFunction()" class="btn btn-danger btn-icon landing-back-top" id="back-to-top">
  <i class="ri-arrow-up-line"></i>
</button>
