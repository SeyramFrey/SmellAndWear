<div class="auth-landing-wrapper">
  <div class="auth-container">
    <!-- Back to shop link -->
    <a routerLink="/" class="back-to-shop">
      <i class="ri-arrow-left-line"></i>
      Back to Shop
    </a>

    <div class="auth-card">
      <div class="auth-header">
        <h2>Welcome Back</h2>
        <p>Sign in to access your account</p>
      </div>

      <!-- Success Message -->
      <div *ngIf="success" class="alert alert-success alert-dismissible fade show" role="alert">
        <i class="ri-checkbox-circle-line me-2"></i>{{ success }}
        <button type="button" class="btn-close" (click)="success = ''" aria-label="Close"></button>
      </div>

      <!-- Error Message -->
      <div *ngIf="error && submitted" class="alert alert-danger alert-dismissible fade show" role="alert">
        <i class="ri-error-warning-line me-2"></i>{{ error }}
        <button type="button" class="btn-close" (click)="error = ''" aria-label="Close"></button>
      </div>

      <form [formGroup]="loginForm" (ngSubmit)="onSubmit()">
        <!-- Email -->
        <div class="form-group">
          <label for="email">Email Address</label>
          <div class="input-wrapper">
            <i class="ri-mail-line"></i>
            <input 
              type="email" 
              id="email" 
              formControlName="email"
              class="form-control"
              [class.is-invalid]="submitted && f['email'].errors"
              placeholder="Enter your email"
              autocomplete="email">
          </div>
          <div *ngIf="submitted && f['email'].errors" class="invalid-feedback d-block">
            <span *ngIf="f['email'].errors['required']">Email is required</span>
            <span *ngIf="f['email'].errors['email']">Please enter a valid email</span>
          </div>
        </div>

        <!-- Password -->
        <div class="form-group">
          <div class="d-flex justify-content-between align-items-center">
            <label for="password">Password</label>
            <a (click)="navigateToForgotPassword()" class="forgot-link">Forgot password?</a>
          </div>
          <div class="input-wrapper">
            <i class="ri-lock-line"></i>
            <input 
              [type]="fieldTextType ? 'text' : 'password'" 
              id="password" 
              formControlName="password"
              class="form-control"
              [class.is-invalid]="submitted && f['password'].errors"
              placeholder="Enter your password"
              autocomplete="current-password">
            <button 
              type="button" 
              class="password-toggle"
              (click)="toggleFieldTextType()">
              <i [class]="fieldTextType ? 'ri-eye-line' : 'ri-eye-off-line'"></i>
            </button>
          </div>
          <div *ngIf="submitted && f['password'].errors" class="invalid-feedback d-block">
            <span *ngIf="f['password'].errors['required']">Password is required</span>
            <span *ngIf="f['password'].errors['minlength']">Password must be at least 6 characters</span>
          </div>
        </div>

        <!-- Remember Me -->
        <div class="form-check mb-4">
          <input 
            type="checkbox" 
            id="rememberMe" 
            formControlName="rememberMe"
            class="form-check-input">
          <label for="rememberMe" class="form-check-label">Remembehhr me</label>
        </div>

        <!-- Submit Button -->
        <button 
          type="submit" 
          class="btn btn-primary btn-block"
          [disabled]="loading">
          <span *ngIf="loading" class="spinner-border spinner-border-sm me-2"></span>
          {{ loading ? 'Signing in...' : 'Sign In' }}
        </button>
      </form>

      <!-- Sign Up Link -->
      <div class="auth-footer">
        <p>Don't have an account? <a (click)="navigateToSignup()">Create one</a></p>
      </div>
    </div>

    <!-- Footer -->
    <div class="auth-bottom-text">
      <p>&copy; {{ year }} Smell and Wear. All rights reserved.</p>
    </div>
  </div>
</div>
